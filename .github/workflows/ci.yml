name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e .[dev]
      - run: pytest -q
      # The conformance gate needs Python 3.12+ (focus-validator's floor);
      # the package itself still supports and tests 3.11.
      - run: pip install focus-validator==2.2.0  # pinned; bump deliberately
        if: matrix.python-version != '3.11'
      - run: python scripts/validate_focus.py
        if: matrix.python-version != '3.11'
